server {
    listen 8099 default_server;
    listen [::]:8099 default_server;

    allow 172.30.32.2;
    deny all;

    absolute_redirect off;

    location = /ingress-bootstrap.js {
        alias /etc/nginx/ingress-bootstrap.js;
        default_type application/javascript;
    }

    # API routes: never rewrite response bodies (JSON breaks easily)
    location ~ ^/(api|v1|v1beta|codex|responses)(/|$) {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin "";

        absolute_redirect off;
        proxy_redirect / $http_x_ingress_path/;
        proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;
    }

    # Next.js static chunks: rewrite hardcoded absolute paths in JS
    location /_next/ {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_set_header Accept-Encoding "";

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;

        sub_filter_once off;
        sub_filter_types text/javascript application/javascript;
        sub_filter '"/_next/' '"$http_x_ingress_path/_next/';
        sub_filter '"/api/' '"$http_x_ingress_path/api/';
        sub_filter '"/dashboard' '"$http_x_ingress_path/dashboard';
        sub_filter '"/login' '"$http_x_ingress_path/login';
        sub_filter '"/landing' '"$http_x_ingress_path/landing';
        sub_filter '"/callback' '"$http_x_ingress_path/callback';
        sub_filter 'fetch("/' 'fetch("$http_x_ingress_path/';
    }

    # Dashboard pages and HTML responses
    location / {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin "";
        proxy_set_header Accept-Encoding "";

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        proxy_redirect / $http_x_ingress_path/;
        proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;

        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript;
        sub_filter '<head>' '<head><base href="$http_x_ingress_path/"><script src="$http_x_ingress_path/ingress-bootstrap.js"></script>';
        sub_filter 'href="/' 'href="$http_x_ingress_path/';
        sub_filter 'src="/' 'src="$http_x_ingress_path/';
        sub_filter 'action="/' 'action="$http_x_ingress_path/';
        sub_filter 'url(/' 'url($http_x_ingress_path/';
        sub_filter '"/_next/' '"$http_x_ingress_path/_next/';
        sub_filter '"/api/' '"$http_x_ingress_path/api/';
        sub_filter '"/dashboard' '"$http_x_ingress_path/dashboard';
        sub_filter '"/login' '"$http_x_ingress_path/login';
        sub_filter '"/landing' '"$http_x_ingress_path/landing';
        sub_filter '"/callback' '"$http_x_ingress_path/callback';
        sub_filter 'fetch("/' 'fetch("$http_x_ingress_path/';
    }
}
