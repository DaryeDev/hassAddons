# Reverse proxy that lets 9Router (a prebuilt Next.js app with basePath ""
# baked in at build time — see https://nextjs.org/docs/app/api-reference/config/next-config-js/basePath)
# run correctly under Home Assistant's dynamic Ingress prefix
# (/api/hassio_ingress/<token>/), which is only known at runtime and can
# never match what's inlined in the upstream image.
#
# Strategy, in order of safety/precision:
#   1. API/data routes         -> proxied byte-for-byte, never rewritten.
#   2. CSS                     -> rewrite url(...) refs (unambiguous, safe).
#   3. Everything else under
#      /_next/ (JS chunks etc) -> proxied byte-for-byte. Rewriting minified
#                                 JS/JSON text risks corrupting unrelated
#                                 string literals, so instead the client-side
#                                 ingress-bootstrap.js patches fetch/XHR/
#                                 history/EventSource/WebSocket at runtime.
#   4. HTML pages               -> rewrite href=/src=/action= attributes
#                                  (unambiguous resource refs) and inject
#                                  ingress-bootstrap.js as the first script.

server {
    listen 8099 default_server;
    listen [::]:8099 default_server;

    allow 172.30.32.2;
    deny all;

    absolute_redirect off;

    location = /ingress-bootstrap.js {
        alias /etc/nginx/ingress-bootstrap.js;
        default_type application/javascript;
    }

    # API/data routes: proxy as-is. Rewriting JSON bodies here would risk
    # corrupting response payloads (provider keys, model IDs, etc.).
    location ~ ^/(api|v1|v1beta|codex|responses)(/|$) {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin "";

        # SSE streams (usage/stream, translator/console-logs/stream) must
        # not be buffered or they'll appear to hang until the buffer fills.
        proxy_buffering off;
        proxy_read_timeout 3600s;

        proxy_redirect / $http_x_ingress_path/;
        proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;
    }

    # CSS: url(...) references (fonts, images) are real resource refs that
    # the browser resolves directly — no JS hook can intercept those, so
    # this is the one asset type that still needs content rewriting.
    location ~* \.css$ {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/css;
        sub_filter 'url(/' 'url($http_x_ingress_path/';
        sub_filter 'url("/' 'url("$http_x_ingress_path/';
        sub_filter "url('/" "url('$http_x_ingress_path/";
    }

    # Next.js static build output (JS chunks, fonts, images): proxied
    # untouched, gzip preserved. Any absolute path referenced from inside
    # these files is handled at runtime by ingress-bootstrap.js instead.
    location /_next/ {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # HTML pages (initial SSR document for every route).
    location / {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin "";
        # sub_filter can't rewrite a gzipped body.
        proxy_set_header Accept-Encoding "";

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        proxy_redirect / $http_x_ingress_path/;
        proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;

        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '<head>' '<head><base data-ingress href="$http_x_ingress_path/"><script src="$http_x_ingress_path/ingress-bootstrap.js"></script>';
        sub_filter 'href="/' 'href="$http_x_ingress_path/';
        sub_filter "href='/" "href='$http_x_ingress_path/";
        sub_filter 'src="/' 'src="$http_x_ingress_path/';
        sub_filter "src='/" "src='$http_x_ingress_path/";
        sub_filter 'action="/' 'action="$http_x_ingress_path/';
        sub_filter 'content="/' 'content="$http_x_ingress_path/';
        # In case of inline <style> blocks with background/font refs.
        sub_filter 'url(/' 'url($http_x_ingress_path/';
        sub_filter 'url("/' 'url("$http_x_ingress_path/';
        sub_filter "url('/" "url('$http_x_ingress_path/";
    }
}
