server {
    listen 8099 default_server;
    listen [::]:8099 default_server;

    allow 172.30.32.2;
    deny all;

    absolute_redirect off;

    location / {
        proxy_pass http://127.0.0.1:20128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Origin "";

        # sub_filter cannot rewrite gzipped bodies; force plain text from Next.js
        proxy_set_header Accept-Encoding "";

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        proxy_redirect / $http_x_ingress_path/;
        proxy_redirect ~^/(.*)$ $http_x_ingress_path/$1;

        sub_filter_once off;
        sub_filter_types text/css text/javascript application/javascript application/json text/plain font/woff2;
        sub_filter '<head>' '<head><base href="$http_x_ingress_path/">';
        sub_filter '="/' '="$http_x_ingress_path/';
        sub_filter "'/" "'$http_x_ingress_path/";
        sub_filter 'href="/' 'href="$http_x_ingress_path/';
        sub_filter 'src="/' 'src="$http_x_ingress_path/';
        sub_filter 'action="/' 'action="$http_x_ingress_path/';
        sub_filter 'url(/' 'url($http_x_ingress_path/';
        sub_filter '"/_next/' '"$http_x_ingress_path/_next/';
        sub_filter "'/_next/" "'$http_x_ingress_path/_next/";
        sub_filter '"/api/' '"$http_x_ingress_path/api/';
    }
}
